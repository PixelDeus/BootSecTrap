<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login page</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="d-flex justify-content-center align-items-start mt-5 pt-5">
    <div style="width: 340px;">
        <h3 class="fw-bold text-center mb-3">Please sign in</h3>
        <form th:action="@{/login}" method="post">
            <input type="text" name="username" class="form-control rounded-0 border-primary border-2 mb-0" placeholder="Email address" required autofocus>
            <input type="password" name="password" class="form-control rounded-0 border-top-0 mb-2" placeholder="Password" required>
            <button type="submit" class="btn btn-primary w-100 rounded-0">Sign in</button>
        </form>
    </div>
</div>
</body>
</html>
