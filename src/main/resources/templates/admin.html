<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Admin panel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-dark bg-dark px-3">
    <span class="navbar-text text-white fw-bold">
        <span th:text="${#authentication.principal.email}"></span>
        with roles:
        <span th:text="${#authentication.principal.roles}"></span>
    </span>
    <form th:action="@{/logout}" method="post" class="ms-auto">
        <button type="submit" class="btn btn-link text-white text-decoration-none">Logout</button>
    </form>
</nav>

<div class="d-flex" style="min-height: calc(100vh - 56px);">

    <!-- Sidebar -->
    <div class="bg-white border-end" style="width: 220px; min-width: 220px;">
        <div class="list-group list-group-flush">
            <a href="/admin" class="list-group-item list-group-item-action active bg-primary text-white border-0 py-3">Admin</a>
            <a href="/user" class="list-group-item list-group-item-action text-primary border-0 py-3">User</a>
        </div>
    </div>

    <!-- Main content -->
    <div class="flex-grow-1 p-4">
        <h3 class="mb-3">Admin panel</h3>

        <!-- Tabs -->
        <ul class="nav nav-tabs mb-3" id="adminTabs">
            <li class="nav-item">
                <a class="nav-link active text-dark" id="tab-table" href="#" onclick="showTab('table'); return false;">Users table</a>
            </li>
            <li class="nav-item">
                <a class="nav-link text-primary" id="tab-new" href="#" onclick="showTab('new'); return false;">New User</a>
            </li>
        </ul>

        <!-- Users table tab -->
        <div id="pane-table">
            <div class="border rounded p-3">
                <h6 class="mb-3">All users</h6>
                <table class="table table-bordered">
                    <thead>
                    <tr>
                        <th>ID</th>
                        <th>First Name</th>
                        <th>Last Name</th>
                        <th>Age</th>
                        <th>Email</th>
                        <th>Role</th>
                        <th>Edit</th>
                        <th>Delete</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="user : ${users}">
                        <td th:text="${user.id}"></td>
                        <td th:text="${user.firstName}"></td>
                        <td th:text="${user.lastName}"></td>
                        <td th:text="${user.age}"></td>
                        <td th:text="${user.email}"></td>
                        <td th:text="${user.roles}"></td>
                        <td>
                            <button class="btn btn-sm btn-info text-white"
                                    th:onclick="'openEditModal(' + ${user.id} + ')'">Edit</button>
                        </td>
                        <td>
                            <button class="btn btn-sm btn-danger"
                                    th:onclick="'openDeleteModal(' + ${user.id} + ')'">Delete</button>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- New User tab -->
        <div id="pane-new" style="display:none;">
            <div class="border rounded p-4" style="max-width: 500px;">
                <form method="post" th:action="@{/admin/add}">
                    <div class="mb-2"><label class="form-label">First Name</label>
                        <input type="text" name="firstName" class="form-control" required></div>
                    <div class="mb-2"><label class="form-label">Last Name</label>
                        <input type="text" name="lastName" class="form-control" required></div>
                    <div class="mb-2"><label class="form-label">Age</label>
                        <input type="number" name="age" class="form-control" required></div>
                    <div class="mb-2"><label class="form-label">Email</label>
                        <input type="email" name="email" class="form-control" required></div>
                    <div class="mb-2"><label class="form-label">Username</label>
                        <input type="text" name="username" class="form-control" required></div>
                    <div class="mb-2"><label class="form-label">Password</label>
                        <input type="password" name="password" class="form-control" required></div>
                    <div class="mb-3"><label class="form-label">Role</label>
                        <select name="roleIds" class="form-select" multiple size="2">
                            <option th:each="role : ${allRoles}" th:value="${role.id}" th:text="${role.name}"></option>
                        </select>
                    </div>
                    <button type="submit" class="btn btn-primary">Add</button>
                </form>
            </div>
        </div>
    </div>
</div>

<!-- Edit Modal -->
<div class="modal fade" id="editModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Edit User</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <form method="post" th:action="@{/admin/update}">
                <div class="modal-body">
                    <input type="hidden" name="id" id="editId">
                    <div class="mb-2"><label class="form-label">First Name</label>
                        <input type="text" name="firstName" id="editFirstName" class="form-control" required></div>
                    <div class="mb-2"><label class="form-label">Last Name</label>
                        <input type="text" name="lastName" id="editLastName" class="form-control" required></div>
                    <div class="mb-2"><label class="form-label">Age</label>
                        <input type="number" name="age" id="editAge" class="form-control" required></div>
                    <div class="mb-2"><label class="form-label">Email</label>
                        <input type="email" name="email" id="editEmail" class="form-control" required></div>
                    <div class="mb-2"><label class="form-label">Username</label>
                        <input type="text" name="username" id="editUsername" class="form-control" required></div>
                    <div class="mb-2"><label class="form-label">Password</label>
                        <input type="password" name="password" id="editPassword" class="form-control"></div>
                    <div class="mb-2"><label class="form-label">Role</label>
                        <select name="roleIds" id="editRoles" class="form-select" multiple size="2">
                            <option th:each="role : ${allRoles}" th:value="${role.id}" th:text="${role.name}"></option>
                        </select>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                    <button type="submit" class="btn btn-primary">Save</button>
                </div>
            </form>
        </div>
    </div>
</div>

<!-- Delete Modal -->
<div class="modal fade" id="deleteModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header bg-danger text-white">
                <h5 class="modal-title">Delete User</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <p>Delete user with ID: <strong id="deleteUserId"></strong>?</p>
            </div>
            <div class="modal-footer">
                <form th:action="@{/admin/delete}" method="post">
                    <input type="hidden" name="id" id="deleteUserIdInput">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                    <button type="submit" class="btn btn-danger">Delete</button>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    function showTab(tab) {
        document.getElementById('pane-table').style.display = tab === 'table' ? '' : 'none';
        document.getElementById('pane-new').style.display = tab === 'new' ? '' : 'none';
        document.getElementById('tab-table').classList.toggle('active', tab === 'table');
        document.getElementById('tab-new').classList.toggle('active', tab === 'new');
    }

    function openEditModal(id) {
        fetch('/admin/user/' + id)
            .then(res => res.json())
            .then(user => {
                document.getElementById('editId').value = user.id;
                document.getElementById('editFirstName').value = user.firstName;
                document.getElementById('editLastName').value = user.lastName;
                document.getElementById('editAge').value = user.age;
                document.getElementById('editEmail').value = user.email;
                document.getElementById('editUsername').value = user.username;
                document.getElementById('editPassword').value = '';
                let select = document.getElementById('editRoles');
                for (let i = 0; i < select.options.length; i++) {
                    select.options[i].selected = user.roles.some(r => r.id == select.options[i].value);
                }
                new bootstrap.Modal(document.getElementById('editModal')).show();
            });
    }

    function openDeleteModal(id) {
        document.getElementById('deleteUserId').innerText = id;
        document.getElementById('deleteUserIdInput').value = id;
        new bootstrap.Modal(document.getElementById('deleteModal')).show();
    }
</script>
</body>
</html>
