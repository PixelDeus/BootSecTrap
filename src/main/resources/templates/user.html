<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>User page</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-dark bg-dark px-3">
    <span class="navbar-text text-white fw-bold">
        <span th:text="${user.email}"></span>
        with roles:
        <span th:text="${user.roles}"></span>
    </span>
    <form th:action="@{/logout}" method="post" class="ms-auto">
        <button type="submit" class="btn btn-link text-white text-decoration-none">Logout</button>
    </form>
</nav>

<div class="d-flex" style="min-height: calc(100vh - 56px);">

    <!-- Sidebar -->
    <div class="bg-white border-end" style="width: 220px; min-width: 220px;">
        <div class="list-group list-group-flush">
            <a href="/admin" class="list-group-item list-group-item-action text-primary border-0 py-3">Admin</a>
            <a href="/user" class="list-group-item list-group-item-action active bg-primary text-white border-0 py-3">User</a>
        </div>
    </div>

    <!-- Main content -->
    <div class="flex-grow-1 p-4">
        <h3 class="mb-3">User information</h3>
        <div class="border rounded p-3" style="max-width: 500px;">
            <table class="table table-bordered mb-0">
                <tr><th>ID</th><td th:text="${user.id}"></td></tr>
                <tr><th>First Name</th><td th:text="${user.firstName}"></td></tr>
                <tr><th>Last Name</th><td th:text="${user.lastName}"></td></tr>
                <tr><th>Age</th><td th:text="${user.age}"></td></tr>
                <tr><th>Email</th><td th:text="${user.email}"></td></tr>
                <tr><th>Username</th><td th:text="${user.username}"></td></tr>
                <tr><th>Role</th><td th:text="${user.roles}"></td></tr>
            </table>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
